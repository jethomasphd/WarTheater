# ═══════════════════════════════════════════════════════════════
# THE WAR THEATER — Cloudflare Worker Configuration
# ═══════════════════════════════════════════════════════════════

name = "wartheater-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

# KV Namespace binding
# Run: wrangler kv:namespace create THEATER_CACHE
# Then paste the ID below
[[kv_namespaces]]
binding = "THEATER_CACHE"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# Environment variables (non-secret)
[vars]
ALLOWED_ORIGINS = "https://iranwar.ai,https://www.iranwar.ai,http://localhost:8788"

# Secrets (set via: wrangler secret put SECRET_NAME)
# ANTHROPIC_API_KEY
# ACLED_API_KEY
# OIL_API_KEY
# FRED_API_KEY

# Routes
# Configure in Cloudflare Dashboard or via:
# routes = [
#   { pattern = "iranwar.ai/api/*", zone_name = "iranwar.ai" }
# ]

# Development
[dev]
port = 8787
local_protocol = "http"
